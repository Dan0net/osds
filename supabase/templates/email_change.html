<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <div style="max-width:480px;margin:0 auto;padding:24px">
    <div style="text-align:center;padding:16px 0">
      <a href="{{ .SiteURL }}"><img src="{{ .SiteURL }}/osds-logo-512.png" alt="One Stop Dog Shop" width="256" style="width:256px;height:auto" /></a>
    </div>
    <div style="background:#ffffff;border-radius:12px;padding:24px;border:1px solid #e5e7eb">
      <h2 style="margin:0 0 16px;font-size:18px;color:#111827">Confirm email change</h2>
      <p style="margin:0 0 12px;font-size:14px;color:#4b5563;line-height:1.5">Click the button below to confirm changing your email address to this one.</p>
      <div style="text-align:center;margin:24px 0"><a href="{{ .ConfirmationURL }}" style="background-color:#4f46e5;color:#ffffff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;display:inline-block">Confirm change</a></div>
      <p style="margin:0 0 12px;font-size:14px;color:#4b5563;line-height:1.5">If you didn't request this change, please secure your account immediately.</p>
    </div>
    <p style="text-align:center;font-size:12px;color:#9ca3af;margin-top:16px">You received this email because an email change was requested for your account.</p>
  </div>
</body>
</html>
