# Supabase local development configuration
# Run `supabase start` to use these settings locally.
# Production settings are managed via the Supabase Dashboard and deploy scripts.

[api]
enabled = true
port = 54321

[db]
port = 54322

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:8888"
additional_redirect_urls = ["http://localhost:8888/**"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

[auth.email.template.confirmation]
subject = "Confirm your email — One Stop Dog Shop"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your password — One Stop Dog Shop"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your login link — One Stop Dog Shop"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm email change — One Stop Dog Shop"
content_path = "./supabase/templates/email_change.html"

[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false
