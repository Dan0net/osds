[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite --host"
  targetPort = 5173
  framework = "#custom"
  autoLaunch = false

[[redirects]]
  from = "/cal/*"
  to = "/.netlify/functions/calendar-feed"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
